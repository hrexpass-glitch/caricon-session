<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>面談記録メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2f0;
  --border:#e8e8e4;--border2:#d4d4cc;
  --text:#1a1a18;--muted:#6b6b64;--dim:#aaa9a0;
  --cc:#2d7a5e;--cc-bg:#edf7f3;--cc-bd:#a8d8c5;
  --cl:#5a4a8e;--cl-bg:#f3f0fa;--cl-bd:#c4b8e8;
  --ac:#c9892a;--ac-lt:#fdf3e3;--ac-bd:#e8c07d;
  --red:#b84a4a;--red-bg:#fdf1f1;--red-bd:#e8a0a0;
  --r:10px;--sh:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.page{display:none;min-height:100vh;padding-bottom:40px}
.page.active{display:block}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.hdr-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600}
.hdr-sub{font-size:9px;letter-spacing:.3em;color:var(--ac);text-transform:uppercase;margin-bottom:1px}
.hdr-back{background:none;border:none;color:var(--ac);font-size:14px;cursor:pointer;padding:4px 8px;font-family:'Noto Sans JP',sans-serif}
.hdr-btn{background:var(--ac);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;padding:7px 14px;border-radius:6px;font-family:'Noto Sans JP',sans-serif}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:12px;box-shadow:var(--sh)}
.sec-lbl{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:12px;font-weight:600}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--ac-bd)}
.field textarea{resize:vertical;min-height:60px;line-height:1.7}
.btn{padding:11px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:active{opacity:.65}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:var(--ac);border-color:var(--ac);color:#fff}
.btn-danger{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.btn-stop{background:#fff0f0;border-color:var(--red-bd);color:var(--red);font-weight:700}
.btn-full{width:100%}
.timer-num{text-align:center;font-size:52px;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--dim);padding:6px 0;font-family:'Noto Serif JP',serif;transition:color .3s}
.timer-num.active{color:var(--ac)}
.timer-num.warning{color:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
.timer-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:4px 0 6px}
.timer-bar{height:100%;background:var(--ac);border-radius:2px;transition:width 1s linear,background .3s}
.timer-bar.warning{background:var(--red)}
.timer-lbl{text-align:center;font-size:10px;color:var(--dim);letter-spacing:.08em;margin-bottom:14px}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-top:8px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0}
.status.rec .status-dot{background:var(--red);animation:dp 1s infinite}
.status.timer .status-dot{background:var(--ac);animation:dp 1s infinite}
.status.done .status-dot{background:var(--cc)}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.speaker-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:2px solid var(--border2);margin-top:10px;background:var(--surface2);transition:all .2s}
.speaker-bar.is-cc{background:var(--cc-bg);border-color:var(--cc-bd)}
.speaker-bar.is-cl{background:var(--cl-bg);border-color:var(--cl-bd)}
.speaker-label{font-size:12px;color:var(--muted);flex:1}
.speaker-name{font-size:14px;font-weight:700}
.speaker-name.cc{color:var(--cc)}
.speaker-name.cl{color:var(--cl)}
.switch-btn{padding:7px 14px;border-radius:6px;border:1px solid;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:transparent}
.switch-btn.to-cl{border-color:var(--cl-bd);color:var(--cl);background:var(--cl-bg)}
.switch-btn.to-cc{border-color:var(--cc-bd);color:var(--cc);background:var(--cc-bg)}
.switch-btn:active{opacity:.7}
.live-text{margin-top:8px;padding:8px 12px;background:var(--ac-lt);border:1px solid var(--ac-bd);border-radius:6px;font-size:12px;color:var(--muted);font-style:italic;display:none}
.live-text.show{display:block}
.action-btn{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:7px;transition:background .15s;box-shadow:var(--sh)}
.action-btn:active{background:var(--surface2)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}
.session-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:10px 12px;box-shadow:var(--sh);cursor:pointer;transition:background .15s}
.session-item:active{background:var(--surface2)}
.session-item.bookmarked{border-color:var(--ac-bd);background:var(--ac-lt)}
.session-item-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.session-title{font-size:14px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-bookmark{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1}
.session-del{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.session-meta{font-size:11px;color:var(--muted);margin-bottom:3px}
.session-note{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-count{font-size:11px;color:var(--dim)}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.35}
.empty-text{font-size:13px;line-height:1.9}
.fab{position:fixed;bottom:24px;right:20px;background:var(--ac);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(201,137,42,.4);z-index:40;display:flex;align-items:center;gap:8px}
.fab:active{opacity:.8}
.transcript-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.transcript-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600}
.count-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--dim)}
.entry-card{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--surface)}
.entry-card:nth-child(even){background:#f8f8f6}
.entry-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.entry-no{font-size:11px;color:var(--dim);font-weight:700;width:22px;flex-shrink:0}
.label-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;border:1px solid;flex-shrink:0}
.label-pill.CC{background:var(--cc-bg);border-color:var(--cc-bd);color:var(--cc)}
.label-pill.CL{background:var(--cl-bg);border-color:var(--cl-bd);color:var(--cl)}
.del-btn{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:3px 6px;margin-left:auto;border-radius:4px}
.del-btn:active{color:var(--red)}
.entry-ta{width:100%;background:transparent;border:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.8;resize:none;outline:none;min-height:48px}
.entry-ta.sub{color:var(--muted);font-size:12px}
.entry-ta.adv{color:#8a5510;font-size:12px}
.entry-div{height:1px;background:var(--border);margin:6px 0}
.entry-sublbl{font-size:9px;letter-spacing:.2em;color:var(--dim);margin-bottom:3px;text-transform:uppercase}
.add-row-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--dim);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;margin-top:6px}
.add-row-btn:active{background:var(--ac-lt);color:var(--ac)}
.memo-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.memo-hdr-txt{font-size:13px;font-weight:600}
.memo-toggle{font-size:11px;color:var(--dim);transition:transform .2s}
.memo-toggle.open{transform:rotate(180deg)}
.memo-body{display:none;margin-top:12px}
.memo-body.open{display:block}
.memo-ta{width:100%;min-height:90px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);resize:vertical;outline:none;line-height:1.75}
.memo-ta:focus{border-color:var(--ac-bd)}
.corr-bar{background:var(--ac-lt);border:1px solid var(--ac-bd);border-radius:var(--r);padding:12px 14px;margin:0 12px;display:none;gap:10px;align-items:center;flex-wrap:wrap}
.corr-bar.show{display:flex}
.corr-txt{font-size:12px;color:var(--ac);flex:1;min-width:180px}
select.corr-sel{background:var(--surface);border:1px solid var(--ac-bd);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:6px 10px;outline:none;flex:1;min-width:120px}
.corr-apply{padding:7px 14px;border-radius:6px;background:var(--ac);border:none;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;font-weight:600}
.corr-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0 4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(247,247,245,.93);z-index:150;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.modal-ov.show{display:flex}
.modal-box{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:340px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-big{font-size:56px;text-align:center;color:var(--ac);font-family:'Noto Serif JP',serif;margin-bottom:8px}
.modal-msg{font-size:14px;text-align:center;color:var(--muted);letter-spacing:.08em;margin-bottom:20px}
.audio-player{margin-top:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;display:none}
.audio-player.show{display:block}
.audio-player audio{width:100%;margin-top:4px}
.audio-label{font-size:11px;color:var(--muted);margin-bottom:4px}

/* ─── スライダー：min=1 max=29 で15が完全中央 ─── */
input[type=range]#timerRange {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 4px;
  border-radius: 2px;
  outline: none;
}
input[type=range]#timerRange::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--ac);
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
input[type=range]#timerRange::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--ac);
  cursor: pointer;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}

@media print {
  .hdr-back,.hdr-btn,.fab,#card-timer,#card-actions,
  .corr-bar,.add-row-btn,.speaker-bar,.live-text,.status,
  .del-btn,.count-badge,#card-transcript,.audio-player{display:none!important;}
  body{font-size:11px!important;background:#fff!important;}
  .page{display:block!important;padding:0!important;}
  #page-list{display:none!important;}
  #page-session{display:block!important;}
  .hdr{position:static!important;box-shadow:none!important;padding:6px 12px!important;border-bottom:2px solid #333!important;}
  #card-info{border:none!important;box-shadow:none!important;margin:0!important;padding:4px 12px!important;}
  #card-info .field{display:inline-block;margin-right:20px;margin-bottom:2px!important;}
  #card-info .field label{font-size:9px!important;}
  #card-info .field input{border:none!important;background:transparent!important;padding:0!important;font-size:11px!important;font-weight:600;}
  #card-memo{border:none!important;box-shadow:none!important;margin:0!important;padding:4px 12px!important;}
  .memo-body{display:block!important;}
  .memo-ta{border:1px solid #ccc!important;background:#fffdf5!important;font-size:10px!important;min-height:auto!important;}
  #print-table{display:block!important;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
</head>
<body>

<!-- PAGE: 一覧 -->
<div class="page active" id="page-list">
  <div class="hdr">
    <div>
      <div class="hdr-sub">Career Counseling</div>
      <div class="hdr-title">面談記録</div>
    </div>
  </div>
  <div id="session-list-wrap"></div>
  <button class="fab" onclick="newSession()">＋ 新しい面談</button>
</div>

<!-- PAGE: セッション -->
<div class="page" id="page-session">
  <div class="hdr">
    <button class="hdr-back" onclick="backToList()">← 一覧</button>
    <div style="text-align:center">
      <div class="hdr-sub">Session</div>
      <div class="hdr-title" id="session-hdr-title">新しい面談</div>
    </div>
    <button class="hdr-btn" onclick="saveSession()">保存</button>
  </div>

  <div class="card" id="card-info">
    <div class="sec-lbl">セッション情報</div>
    <div class="field"><label>面談タイトル</label><input type="text" id="sessionTitle" placeholder="例：2026-03-15の面談"></div>
    <div class="field"><label>実施日</label><input type="date" id="sessionDate"></div>
    <div class="field"><label>CC（キャリアコンサルタント）</label><input type="text" id="ccName" placeholder="氏名を入力"></div>
    <div class="field"><label>CL（クライアント）</label><input type="text" id="clName" placeholder="氏名 or イニシャル"></div>
    <div class="field"><label>メモ</label><textarea id="sessionNote" placeholder="この面談についての簡単なメモ…"></textarea></div>
  </div>

  <div class="card" id="card-timer">
    <div class="sec-lbl">タイマー &amp; 録音</div>

    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn" style="flex:1;font-weight:700;font-size:14px;line-height:1.4" onclick="setTimer(15)">⏱ 15分<br><span style="font-size:9px;font-weight:400;opacity:.7">国キャリ</span></button>
      <button class="btn" style="flex:1;font-weight:700;font-size:14px;line-height:1.4" onclick="setTimer(30)">⏱ 30分<br><span style="font-size:9px;font-weight:400;opacity:.7">1級・2級</span></button>
    </div>

    <div class="field" style="margin-bottom:10px">
      <label>カスタム時間（分）</label>
      <div style="display:flex;align-items:center;gap:10px">
        <!-- ★修正: min="1" max="29" → value=15 がぴったり中央 -->
        <input type="range" id="timerRange" min="1" max="29" value="15" oninput="onRangeChange(this.value)" style="flex:1">
        <span id="timerRangeVal" style="font-size:16px;font-weight:700;color:var(--ac);min-width:40px;text-align:right">15分</span>
      </div>
    </div>

    <div class="timer-num" id="timerDisplay">15:00</div>
    <div class="timer-bar-bg"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="timer-lbl" id="timerLbl">15分カウントダウン</div>

    <button class="btn btn-full btn-primary" id="startBtn" onclick="toggleStart()" style="margin-bottom:8px;font-size:15px;padding:14px">▶ スタート</button>

    <div class="speaker-bar" id="speakerBar" style="margin-bottom:8px">
      <div class="speaker-label">現在の発言者</div>
      <div class="speaker-name cc" id="speakerName">CC</div>
      <button class="switch-btn to-cl" id="switchBtn" onclick="switchSpeaker()">CLに切替</button>
    </div>

    <button class="btn btn-full" id="resetBtn" onclick="resetTimerFull()" style="margin-bottom:0">↺ リセット</button>

    <div class="status" id="statusBar">
      <span class="status-dot"></span>
      <span id="statusTxt">タイマーまたは録音を開始してください</span>
    </div>

    <div class="live-text" id="liveText"></div>

    <div class="audio-player" id="audioPlayer">
      <div class="audio-label">🎧 録音データ</div>
      <audio id="audioEl" controls style="width:100%;margin-bottom:8px"></audio>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <button class="btn" id="audioPlayBtn" onclick="toggleAudio()" style="font-size:12px;padding:8px">▶ 再生</button>
        <button class="btn" onclick="downloadAudio()" style="font-size:12px;padding:8px">↓ ダウンロード</button>
      </div>
    </div>
  </div>

  <div class="card" id="card-actions">
    <div class="sec-lbl">操作</div>
    <button class="action-btn" id="correctBtn" onclick="showCorrection()" disabled>⇄ ラベルずれを一括訂正</button>
    <button class="action-btn" onclick="addRow()">＋ 行を手動追加</button>
    <button class="action-btn" id="pdfBtn" onclick="downloadPdf()" disabled>↓ PDF出力</button>
  </div>

  <div class="corr-bar" id="corrBar">
    <div class="corr-txt"><strong>一括訂正：</strong>何番目以降が入れ替わっていますか？</div>
    <select class="corr-sel" id="corrFrom"><option value="">番号を選択</option></select>
    <button class="corr-apply" onclick="applyCorrection()">訂正</button>
    <button class="corr-close" onclick="hideCorrection()">✕</button>
  </div>

  <div class="card" id="card-transcript">
    <div class="transcript-hdr">
      <span class="transcript-title">逐語録</span>
      <span class="count-badge" id="entryCounter">—</span>
    </div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🎙</div>
      <div class="empty-text">録音すると逐語録が自動で入力されます<br>手動で行を追加することもできます</div>
    </div>
    <div id="tableWrap" style="display:none">
      <div id="entryList"></div>
      <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>
    </div>
  </div>

<div id="print-table" style="display:none;padding:0 12px">
  <table style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px">
    <thead>
      <tr style="background:#f2f2f0">
        <th style="border:1px solid #ccc;padding:5px;width:28px;text-align:center">番号</th>
        <th style="border:1px solid #ccc;padding:5px;width:36px;text-align:center">話者</th>
        <th style="border:1px solid #ccc;padding:5px;width:36px;text-align:center">時刻</th>
        <th style="border:1px solid #ccc;padding:5px">逐語録</th>
        <th style="border:1px solid #ccc;padding:5px;width:25%">気づき・改善案・新案</th>
        <th style="border:1px solid #ccc;padding:5px;width:18%">アドバイス</th>
      </tr>
    </thead>
    <tbody id="pt-body"></tbody>
  </table>
</div>

  <div class="card" id="card-memo">
    <div class="memo-hdr" onclick="toggleMemo()">
      <span class="memo-hdr-txt">📝 総合メモ・フィードバック</span>
      <span class="memo-toggle" id="memoToggle">▼</span>
    </div>
    <div class="memo-body" id="memoBody">
      <textarea class="memo-ta" id="memoText" placeholder="全体を通じての気づき、改善点、良かった点などを記録…"></textarea>
    </div>
  </div>
</div>

<div class="modal-ov" id="timerModal">
  <div class="modal-box">
    <div class="modal-big">⏰</div>
    <div class="modal-msg">時間が経過しました</div>
    <button class="btn btn-primary btn-full" onclick="dismissModal()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'caricon_sessions_v3';

(function migrate() {
  try {
    ['caricon_sessions_v2','caricon_sessions_v1','caricon_sessions'].forEach(key => {
      const old = localStorage.getItem(key);
      if (!old) return;
      const oldData = JSON.parse(old);
      if (!oldData || !oldData.length) return;
      const current = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      const ids = current.map(s => s.id);
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...current, ...oldData.filter(s => !ids.includes(s.id))]));
      localStorage.removeItem(key);
    });
  } catch(e) {}
})();

function loadSessions() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveSessions(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let sessions = loadSessions();
let currentSessionId = null;
let entries = [], nextId = 1;
let TIMER_DURATION = 15 * 60;
let timerSecondsLeft = TIMER_DURATION;
let isTimerRunning = false, timerInterval = null;
let isRecording = false, isPaused = false;
let mediaRecorder = null, audioStream = null;
let allAudioChunks = [], audioBlob = null;
let speechRecognition = null;
let currentSpeaker = 'CC';

document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];

// ★修正: min=1, max=29 → (val-1)/(29-1)*100 で正確な塗り分け
updateSliderBg(15);
renderSessionList();

// ─── スライダー背景更新（min=1, max=29 基準）───
function updateSliderBg(val) {
  const pct = ((val - 1) / (29 - 1)) * 100;  // ★修正箇所
  const el = document.getElementById('timerRange');
  if (el) el.style.background = `linear-gradient(to right, var(--ac) ${pct}%, var(--border2) ${pct}%)`;
}

// ─── Session List ───
function renderSessionList() {
  const wrap = document.getElementById('session-list-wrap');
  if (!sessions.length) {
    wrap.innerHTML = '<div class="empty-state" style="padding-top:80px"><div class="empty-icon">📋</div><div class="empty-text">面談記録がまだありません<br>「＋ 新しい面談」から始めましょう</div></div>';
    return;
  }
  const sorted = [...sessions].sort((a,b) => {
    if (a.bookmarked && !b.bookmarked) return -1;
    if (!a.bookmarked && b.bookmarked) return 1;
    return (b.savedAt||0) - (a.savedAt||0);
  });
  wrap.innerHTML = sorted.map(s => `
    <div class="session-item${s.bookmarked?' bookmarked':''}" onclick="openSession('${s.id}')">
      <div class="session-item-top">
        <span class="session-title">${s.title || s.date+'の面談' || '無題の面談'}</span>
        <button class="session-bookmark" onclick="event.stopPropagation();toggleBookmark('${s.id}')">${s.bookmarked?'★':'☆'}</button>
        <button class="session-del" onclick="event.stopPropagation();deleteSession('${s.id}')">🗑</button>
      </div>
      <div class="session-meta">📅 ${s.date||'日付未設定'} ／ CC: ${s.ccName||'未設定'} ／ CL: ${s.clName||'未設定'}</div>
      <div class="session-count">${s.entries?s.entries.length:0} 件の発言</div>
      ${s.note?`<div class="session-note">📝 ${s.note}</div>`:''}
    </div>
  `).join('');
}

function toggleBookmark(id) {
  const s = sessions.find(x => x.id===id); if (!s) return;
  s.bookmarked = !s.bookmarked; saveSessions(sessions); renderSessionList();
  toast(s.bookmarked ? '★ ブックマークしました' : 'ブックマークを解除しました');
}

function newSession() {
  currentSessionId = 'session_' + Date.now();
  entries = []; nextId = 1; audioBlob = null; allAudioChunks = [];
  finalizeRec(); resetTimerFull();
  const today = new Date().toISOString().split('T')[0];
  ['sessionDate','sessionTitle','ccName','clName','sessionNote','memoText'].forEach(id => {
    document.getElementById(id).value = id==='sessionDate' ? today : id==='sessionTitle' ? today+'の面談' : '';
  });
  document.getElementById('session-hdr-title').textContent = today+'の面談';
  document.getElementById('audioPlayer').classList.remove('show');
  currentSpeaker = 'CC'; updateSpeakerBar(); renderEntries(); showPage('page-session');
}

function openSession(id) {
  const s = sessions.find(x => x.id===id); if (!s) return;
  currentSessionId = id;
  entries = (s.entries||[]).map(e=>({...e}));
  nextId = entries.length ? Math.max(...entries.map(e=>e.id))+1 : 1;
  audioBlob = null; allAudioChunks = [];
  document.getElementById('sessionTitle').value = s.title||'';
  document.getElementById('sessionDate').value = s.date||'';
  document.getElementById('ccName').value = s.ccName||'';
  document.getElementById('clName').value = s.clName||'';
  document.getElementById('sessionNote').value = s.note||'';
  document.getElementById('memoText').value = s.memo||'';
  document.getElementById('session-hdr-title').textContent = s.title||s.date||'面談記録';
  document.getElementById('audioPlayer').classList.remove('show');
  resetTimerFull(); renderEntries();
  if (entries.length) enableBtns();
  showPage('page-session');
}

function deleteSession(id) {
  if (!confirm('この面談記録を削除しますか？')) return;
  sessions = sessions.filter(s => s.id!==id); saveSessions(sessions); renderSessionList(); toast('削除しました');
}

function saveSession() {
  const title = document.getElementById('sessionTitle').value || document.getElementById('sessionDate').value+'の面談';
  const existing = sessions.find(s => s.id===currentSessionId);
  const data = {
    id:currentSessionId,
    title, date:document.getElementById('sessionDate').value,
    ccName:document.getElementById('ccName').value,
    clName:document.getElementById('clName').value,
    note:document.getElementById('sessionNote').value,
    memo:document.getElementById('memoText').value,
    entries:entries.map(e=>({...e})),
    bookmarked:existing?existing.bookmarked:false, savedAt:Date.now()
  };
  const idx = sessions.findIndex(s => s.id===currentSessionId);
  if (idx>=0) sessions[idx]=data; else sessions.push(data);
  saveSessions(sessions);
  document.getElementById('session-hdr-title').textContent = title;
  toast('保存しました ✓');
}

function backToList() {
  finalizeRec();
  if (isTimerRunning) { clearInterval(timerInterval); isTimerRunning = false; }
  showPage('page-list'); renderSessionList();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ─── Timer ───
function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0'); }

function setTimer(min) {
  if (isTimerRunning) return;
  TIMER_DURATION = min*60; timerSecondsLeft = TIMER_DURATION;
  // ★修正: 29を超える場合はスライダーを29（右端）に寄せる。15分はvalue=15でぴったり中央
  const clamped = Math.min(Math.max(min, 1), 29);
  document.getElementById('timerRange').value = clamped;
  document.getElementById('timerRangeVal').textContent = min+'分';
  updateSliderBg(clamped);
  updateTimerUI(); toast(min+'分にセットしました');
}

function onRangeChange(val) {
  if (isTimerRunning) return;
  const mins = parseInt(val);  // min=1なのでMath.maxは不要
  TIMER_DURATION = mins*60; timerSecondsLeft = TIMER_DURATION;
  document.getElementById('timerRangeVal').textContent = mins+'分';
  updateSliderBg(mins);
  updateTimerUI();
}

function updateTimerUI() {
  const d = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  const lbl = document.getElementById('timerLbl');
  bar.style.width = (timerSecondsLeft/TIMER_DURATION*100)+'%';
  d.textContent = fmt(timerSecondsLeft);
  if (timerSecondsLeft<=60 && isTimerRunning) {
    d.className='timer-num warning'; bar.className='timer-bar warning';
    lbl.textContent='残り '+timerSecondsLeft+'秒';
  } else if (isTimerRunning) {
    d.className='timer-num active'; bar.className='timer-bar';
    lbl.textContent='残り '+fmt(timerSecondsLeft);
  } else {
    d.className='timer-num'; bar.className='timer-bar';
    lbl.textContent=timerSecondsLeft===TIMER_DURATION?(TIMER_DURATION/60)+'分カウントダウン':'一時停止中 — '+fmt(timerSecondsLeft);
  }
}

function startCountdown() {
  if (isTimerRunning) return;
  isTimerRunning = true;
  timerInterval = setInterval(()=>{ timerSecondsLeft--; updateTimerUI(); if(timerSecondsLeft<=0){clearInterval(timerInterval);isTimerRunning=false;onTimerEnd();} },1000);
  updateTimerUI();
}

function resetTimerFull() {
  clearInterval(timerInterval); isTimerRunning = false; isPaused = false;
  timerSecondsLeft = TIMER_DURATION;
  const btn = document.getElementById('startBtn');
  btn.textContent='▶ スタート'; btn.className='btn btn-full btn-primary';
  btn.style.cssText='margin-bottom:8px;font-size:15px;padding:14px';
  updateTimerUI();
}

function onTimerEnd() {
  beep();
  document.getElementById('timerModal').classList.add('show');
  finalizeRec();
  setStatus('done','タイマー終了');
  const btn = document.getElementById('startBtn');
  btn.textContent='▶ スタート'; btn.className='btn btn-full btn-primary';
  btn.style.cssText='margin-bottom:8px;font-size:15px;padding:14px';
  saveSession(); toast('タイマー終了 — 自動保存しました ✓');
}

function dismissModal() { document.getElementById('timerModal').classList.remove('show'); }

function beep() {
  try {
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value=880; gain.gain.setValueAtTime(0.4,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.0);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime+1.0);
  } catch(e){}
}

// ─── Recording（一時停止→再開でも音声が途切れない）───
async function startRec() {
  try {
    audioStream = await navigator.mediaDevices.getUserMedia({audio:true});
    allAudioChunks = [];
    mediaRecorder = new MediaRecorder(audioStream);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) allAudioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(allAudioChunks,{type:'audio/webm'});
      document.getElementById('audioEl').src = URL.createObjectURL(audioBlob);
      document.getElementById('audioPlayer').classList.add('show');
    };
    mediaRecorder.start(1000);
    isRecording=true; isPaused=false;
    startSpeechRecognition();
    return true;
  } catch(e) { toast('マイクへのアクセスが許可されていません'); return false; }
}

function pauseRec() {
  if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.pause();
  isPaused=true;
  if(speechRecognition){try{speechRecognition.stop();}catch(e){} speechRecognition=null;}
  document.getElementById('liveText').classList.remove('show');
}

function resumeRec() {
  if(mediaRecorder && mediaRecorder.state==='paused') mediaRecorder.resume();
  isPaused=false; startSpeechRecognition();
}

function finalizeRec() {
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(audioStream){audioStream.getTracks().forEach(t=>t.stop()); audioStream=null;}
  isRecording=false; isPaused=false;
  if(speechRecognition){try{speechRecognition.stop();}catch(e){} speechRecognition=null;}
  document.getElementById('liveText').classList.remove('show');
}

// ─── Start / Pause / Resume ───
function toggleStart() {
  if (!isRecording && !isTimerRunning && !isPaused) { startBoth(); }
  else if (isRecording && !isPaused) { pauseBoth(); }
  else if (isPaused) { resumeBoth(); }
}

async function startBoth() {
  currentSpeaker='CC'; updateSpeakerBar();
  const ok = await startRec();
  startCountdown();
  const btn = document.getElementById('startBtn');
  btn.textContent='⏸ 一時停止'; btn.className='btn btn-full btn-stop';
  btn.style.cssText='margin-bottom:8px;font-size:15px;padding:14px';
  setStatus('rec', ok?'録音中 + タイマー動作中':'タイマー動作中（マイク未使用）');
}

function pauseBoth() {
  pauseRec(); clearInterval(timerInterval); isTimerRunning=false;
  const btn = document.getElementById('startBtn');
  btn.textContent='▶ 再開'; btn.className='btn btn-full btn-primary';
  btn.style.cssText='margin-bottom:8px;font-size:15px;padding:14px';
  updateTimerUI(); setStatus('','一時停止中'); toast('一時停止しました');
}

function resumeBoth() {
  resumeRec(); startCountdown();
  const btn = document.getElementById('startBtn');
  btn.textContent='⏸ 一時停止'; btn.className='btn btn-full btn-stop';
  btn.style.cssText='margin-bottom:8px;font-size:15px;padding:14px';
  setStatus('rec','録音中 + タイマー動作中'); toast('再開しました');
}

// ─── Speaker ───
function updateSpeakerBar() {
  const ccN=document.getElementById('ccName').value||'CC';
  const clN=document.getElementById('clName').value||'CL';
  const bar=document.getElementById('speakerBar'), nameEl=document.getElementById('speakerName'), btn=document.getElementById('switchBtn');
  if(currentSpeaker==='CC'){
    bar.className='speaker-bar is-cc'; nameEl.className='speaker-name cc';
    nameEl.textContent='CC（'+ccN+'）'; btn.className='switch-btn to-cl'; btn.textContent='CL に切替';
  } else {
    bar.className='speaker-bar is-cl'; nameEl.className='speaker-name cl';
    nameEl.textContent='CL（'+clN+'）'; btn.className='switch-btn to-cc'; btn.textContent='CC に切替';
  }
}
function switchSpeaker() { currentSpeaker=currentSpeaker==='CC'?'CL':'CC'; updateSpeakerBar(); toast(currentSpeaker+' に切り替えました'); }

// ─── Speech ───
function startSpeechRecognition() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return;
  speechRecognition=new SR(); speechRecognition.lang='ja-JP'; speechRecognition.continuous=true; speechRecognition.interimResults=true;
  const liveEl=document.getElementById('liveText'); liveEl.classList.add('show');
  let finalBuffer='', silenceTimer=null;
  speechRecognition.onresult=event=>{
    let interim='',final='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      const t=event.results[i][0].transcript;
      if(event.results[i].isFinal) final+=t; else interim+=t;
    }
    if(interim) liveEl.textContent='🎤 '+interim;
    if(final.trim()){
      finalBuffer+=final; liveEl.textContent='✓ '+finalBuffer;
      clearTimeout(silenceTimer);
      silenceTimer=setTimeout(()=>{
        if(finalBuffer.trim()){
          const el=TIMER_DURATION-timerSecondsLeft;
          const mm=Math.floor(el/60).toString().padStart(2,'0'), ss=(el%60).toString().padStart(2,'0');
          entries.push({id:nextId++,label:currentSpeaker,text:finalBuffer.trim(),notes:'',advice:'',time:mm+':'+ss});
          renderEntries(); enableBtns(); finalBuffer=''; liveEl.textContent='';
        }
      },1800);
    }
  };
  speechRecognition.onerror=()=>{};
  speechRecognition.onend=()=>{ if(isRecording&&!isPaused) try{speechRecognition.start();}catch(e){} };
  try{speechRecognition.start();}catch(e){}
}

// ─── Entries ───
function renderEntries() {
  const empty=document.getElementById('emptyState'), wrap=document.getElementById('tableWrap'), counter=document.getElementById('entryCounter');
  if(!entries.length){empty.style.display='block';wrap.style.display='none';counter.textContent='—';return;}
  empty.style.display='none'; wrap.style.display='block'; counter.textContent=entries.length+' 件';
  document.getElementById('entryList').innerHTML=entries.map((e,i)=>`
    <div class="entry-card" id="ec-${e.id}">
      <div class="entry-top">
        <span class="entry-no">${String(i+1).padStart(2,'0')}</span>
        <button class="label-pill ${e.label}" onclick="toggleLabel(${e.id})">${e.label}</button>
        ${e.time?`<span style="font-size:10px;color:var(--dim);margin-left:2px">${e.time}</span>`:''}
        <button class="del-btn" onclick="delEntry(${e.id})">✕</button>
      </div>
      <textarea class="entry-ta" rows="3" oninput="updateField(${e.id},'text',this.value)" placeholder="逐語録">${esc(e.text)}</textarea>
      <div class="entry-div"></div>
      <div class="entry-sublbl">気づき・改善案</div>
      <textarea class="entry-ta sub" rows="2" oninput="updateField(${e.id},'notes',this.value)" placeholder="気づき・改善案・新案">${esc(e.notes)}</textarea>
      <div class="entry-div"></div>
      <div class="entry-sublbl">アドバイス</div>
      <textarea class="entry-ta adv" rows="2" oninput="updateField(${e.id},'advice',this.value)" placeholder="アドバイス">${esc(e.advice)}</textarea>
    </div>
  `).join('');
  const sel=document.getElementById('corrFrom');
  sel.innerHTML='<option value="">番号を選択</option>'+entries.map((e,i)=>`<option value="${i}">${String(i+1).padStart(2,'0')} (${e.label}): ${e.text.slice(0,18)}…</option>`).join('');
}

function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function addRow(){entries.push({id:nextId++,label:currentSpeaker||'CC',text:'',notes:'',advice:'',time:''});renderEntries();enableBtns();}
function toggleLabel(id){const e=entries.find(e=>e.id===id);if(e){e.label=e.label==='CC'?'CL':'CC';renderEntries();}}
function updateField(id,field,val){const e=entries.find(e=>e.id===id);if(e)e[field]=val;}
function delEntry(id){if(!confirm('この行を削除しますか？'))return;entries=entries.filter(e=>e.id!==id);renderEntries();}
function enableBtns(){document.getElementById('pdfBtn').disabled=false;document.getElementById('correctBtn').disabled=false;}

// ─── Correction ───
function showCorrection(){document.getElementById('corrBar').classList.add('show');}
function hideCorrection(){document.getElementById('corrBar').classList.remove('show');}
function applyCorrection(){
  const from=parseInt(document.getElementById('corrFrom').value);
  if(isNaN(from)){toast('番号を選択してください');return;}
  for(let i=from;i<entries.length;i++) entries[i].label=entries[i].label==='CC'?'CL':'CC';
  renderEntries();hideCorrection();toast((from+1)+'番目以降のラベルを入れ替えました ✓');
}

// ─── Memo ───
function toggleMemo(){document.getElementById('memoBody').classList.toggle('open');document.getElementById('memoToggle').classList.toggle('open');}

// ─── Status ───
function setStatus(type,text){
  document.getElementById('statusBar').className='status'+(type?' '+type:'');
  document.getElementById('statusTxt').textContent=text;
}

// ─── PDF ───
function downloadPdf(){
  const ccN=document.getElementById('ccName').value||'CC', clN=document.getElementById('clName').value||'CL';
  document.getElementById('pt-body').innerHTML=entries.map((e,i)=>{
    const lc=e.label==='CC'?'#2d7a5e':'#5a4a8e', name=e.label==='CC'?ccN:clN;
    return '<tr style="page-break-inside:avoid">'
      +'<td style="border:1px solid #ccc;padding:4px 5px;text-align:center;color:#888;font-size:10px">'+String(i+1).padStart(2,'0')+'</td>'
      +'<td style="border:1px solid #ccc;padding:4px 5px;text-align:center"><span style="display:inline-block;background:'+lc+';color:#fff;font-size:9px;font-weight:bold;padding:1px 5px;border-radius:3px">'+e.label+'</span><br><span style="font-size:9px;color:#666">'+name+'</span></td>'
      +'<td style="border:1px solid #ccc;padding:4px 5px;text-align:center;font-size:10px;color:#888">'+(e.time||'—')+'</td>'
      +'<td style="border:1px solid #ccc;padding:4px 6px;line-height:1.6">'+(e.text||'').replace(/</g,'&lt;')+'</td>'
      +'<td style="border:1px solid #ccc;padding:4px 6px;line-height:1.6;color:#444">'+(e.notes||'').replace(/</g,'&lt;')+'</td>'
      +'<td style="border:1px solid #ccc;padding:4px 6px;line-height:1.6;color:#8a5510">'+(e.advice||'').replace(/</g,'&lt;')+'</td>'
      +'</tr>';
  }).join('');
  const pt=document.getElementById('print-table'); pt.style.display='block';
  document.getElementById('memoBody').classList.add('open'); document.getElementById('memoToggle').classList.add('open');
  window.onafterprint=()=>{pt.style.display='none';};
  requestAnimationFrame(()=>requestAnimationFrame(()=>window.print()));
}

// ─── Audio ───
function toggleAudio(){
  const audio=document.getElementById('audioEl'), btn=document.getElementById('audioPlayBtn');
  if(audio.paused){audio.play();btn.textContent='■ 再生停止';btn.className='btn btn-danger';audio.onended=()=>{btn.textContent='▶ 再生';btn.className='btn';};}
  else{audio.pause();audio.currentTime=0;btn.textContent='▶ 再生';btn.className='btn';}
}
function downloadAudio(){
  if(!audioBlob){toast('録音データがありません');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(audioBlob);
  a.download='録音_'+(document.getElementById('sessionDate').value||'recording').replace(/-/g,'')+'.webm';
  a.click(); toast('録音データをダウンロードしました');
}

// ─── Toast ───
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
</script>
