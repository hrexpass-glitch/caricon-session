<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>面談記録メーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2f0;
  --border:#e8e8e4;--border2:#d4d4cc;
  --text:#1a1a18;--muted:#6b6b64;--dim:#aaa9a0;
  --cc:#2d7a5e;--cc-bg:#edf7f3;--cc-bd:#a8d8c5;
  --cl:#5a4a8e;--cl-bg:#f3f0fa;--cl-bd:#c4b8e8;
  --ac:#c9892a;--ac-lt:#fdf3e3;--ac-bd:#e8c07d;
  --red:#b84a4a;--red-bg:#fdf1f1;--red-bd:#e8a0a0;
  --r:10px;--sh:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.page{display:none;min-height:100vh;padding-bottom:40px}
.page.active{display:block}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.hdr-title{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600}
.hdr-sub{font-size:9px;letter-spacing:.3em;color:var(--ac);text-transform:uppercase;margin-bottom:1px}
.hdr-back{background:none;border:none;color:var(--ac);font-size:14px;cursor:pointer;padding:4px 8px;font-family:'Noto Sans JP',sans-serif}
.hdr-btn{background:var(--ac);border:none;color:#fff;font-size:12px;font-weight:700;cursor:pointer;padding:7px 14px;border-radius:6px;font-family:'Noto Sans JP',sans-serif}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:12px;box-shadow:var(--sh)}
.sec-lbl{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:12px;font-weight:600}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Noto Sans JP',sans-serif;font-size:14px;color:var(--text);outline:none}
.field input:focus{border-color:var(--ac-bd)}
.btn{padding:11px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.btn:active{opacity:.65}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-primary{background:var(--ac);border-color:var(--ac);color:#fff}
.btn-danger{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.btn-full{width:100%}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.timer-num{text-align:center;font-size:52px;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--dim);padding:6px 0;font-family:'Noto Serif JP',serif;transition:color .3s}
.timer-num.active{color:var(--ac)}
.timer-num.warning{color:var(--red);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
.timer-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin:4px 0 6px}
.timer-bar{height:100%;background:var(--ac);border-radius:2px;transition:width 1s linear,background .3s}
.timer-bar.warning{background:var(--red)}
.timer-lbl{text-align:center;font-size:10px;color:var(--dim);letter-spacing:.08em;margin-bottom:14px}
.status{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-top:8px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0}
.status.rec .status-dot{background:var(--red);animation:dp 1s infinite}
.status.timer .status-dot{background:var(--ac);animation:dp 1s infinite}
.status.done .status-dot{background:var(--cc)}
@keyframes dp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.speaker-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:2px solid var(--border2);margin-top:10px;background:var(--surface2);transition:all .2s}
.speaker-bar.is-cc{background:var(--cc-bg);border-color:var(--cc-bd)}
.speaker-bar.is-cl{background:var(--cl-bg);border-color:var(--cl-bd)}
.speaker-label{font-size:12px;color:var(--muted);flex:1}
.speaker-name{font-size:14px;font-weight:700}
.speaker-name.cc{color:var(--cc)}
.speaker-name.cl{color:var(--cl)}
.switch-btn{padding:7px 14px;border-radius:6px;border:1px solid;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:transparent}
.switch-btn.to-cl{border-color:var(--cl-bd);color:var(--cl);background:var(--cl-bg)}
.switch-btn.to-cc{border-color:var(--cc-bd);color:var(--cc);background:var(--cc-bg)}
.switch-btn:active{opacity:.7}
.live-text{margin-top:8px;padding:8px 12px;background:var(--ac-lt);border:1px solid var(--ac-bd);border-radius:6px;font-size:12px;color:var(--muted);font-style:italic;display:none}
.live-text.show{display:block}
.action-btn{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:7px;transition:background .15s;box-shadow:var(--sh)}
.action-btn:active{background:var(--surface2)}
.action-btn:disabled{opacity:.3;cursor:not-allowed}
.session-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);cursor:pointer}
.session-item:active{background:var(--surface2)}
.session-item-left{flex:1;min-width:0}
.session-date{font-size:12px;color:var(--muted);margin-bottom:3px}
.session-names{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-count{font-size:11px;color:var(--dim);margin-top:2px}
.session-arrow{color:var(--dim);font-size:18px;flex-shrink:0}
.session-del{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;flex-shrink:0}
.session-del:active{color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.35}
.empty-text{font-size:13px;line-height:1.9}
.fab{position:fixed;bottom:24px;right:20px;background:var(--ac);color:#fff;border:none;border-radius:50px;padding:14px 22px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(201,137,42,.4);z-index:40;display:flex;align-items:center;gap:8px}
.fab:active{opacity:.8}
.transcript-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.transcript-title{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600}
.count-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--dim)}
.entry-card{border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--surface)}
.entry-card:nth-child(even){background:#f8f8f6}
.entry-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.entry-no{font-size:11px;color:var(--dim);font-weight:700;width:22px;flex-shrink:0}
.label-pill{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.1em;cursor:pointer;border:1px solid;flex-shrink:0}
.label-pill.CC{background:var(--cc-bg);border-color:var(--cc-bd);color:var(--cc)}
.label-pill.CL{background:var(--cl-bg);border-color:var(--cl-bd);color:var(--cl)}
.del-btn{background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:3px 6px;margin-left:auto;border-radius:4px}
.del-btn:active{color:var(--red)}
.entry-ta{width:100%;background:transparent;border:none;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;line-height:1.8;resize:none;outline:none;min-height:48px}
.entry-ta.sub{color:var(--muted);font-size:12px}
.entry-ta.adv{color:#8a5510;font-size:12px}
.entry-div{height:1px;background:var(--border);margin:6px 0}
.entry-sublbl{font-size:9px;letter-spacing:.2em;color:var(--dim);margin-bottom:3px;text-transform:uppercase}
.add-row-btn{width:100%;padding:10px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--dim);font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;margin-top:6px}
.add-row-btn:active{background:var(--ac-lt);color:var(--ac)}
.memo-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.memo-hdr-txt{font-size:13px;font-weight:600}
.memo-toggle{font-size:11px;color:var(--dim);transition:transform .2s}
.memo-toggle.open{transform:rotate(180deg)}
.memo-body{display:none;margin-top:12px}
.memo-body.open{display:block}
.memo-ta{width:100%;min-height:90px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);resize:vertical;outline:none;line-height:1.75}
.memo-ta:focus{border-color:var(--ac-bd)}
.corr-bar{background:var(--ac-lt);border:1px solid var(--ac-bd);border-radius:var(--r);padding:12px 14px;margin:0 12px 0;display:none;gap:10px;align-items:center;flex-wrap:wrap}
.corr-bar.show{display:flex}
.corr-txt{font-size:12px;color:var(--ac);flex:1;min-width:180px}
select.corr-sel{background:var(--surface);border:1px solid var(--ac-bd);border-radius:6px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:6px 10px;outline:none;flex:1;min-width:120px}
.corr-apply{padding:7px 14px;border-radius:6px;background:var(--ac);border:none;color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:12px;cursor:pointer;font-weight:600}
.corr-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:0 4px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(247,247,245,.93);z-index:150;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.modal-ov.show{display:flex}
.modal-box{background:var(--surface);border-radius:16px;padding:28px;width:100%;max-width:340px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.1)}
.modal-big{font-size:56px;text-align:center;color:var(--ac);font-family:'Noto Serif JP',serif;margin-bottom:8px}
.modal-msg{font-size:14px;text-align:center;color:var(--muted);letter-spacing:.08em;margin-bottom:20px}
</style>
</head>
<body>

<!-- PAGE: 一覧 -->
<div class="page active" id="page-list">
  <div class="hdr">
    <div>
      <div class="hdr-sub">Career Counseling</div>
      <div class="hdr-title">面談記録</div>
    </div>
  </div>
  <div id="session-list-wrap"></div>
  <button class="fab" onclick="newSession()">＋ 新しい面談</button>
</div>

<!-- PAGE: セッション -->
<div class="page" id="page-session">
  <div class="hdr">
    <button class="hdr-back" onclick="backToList()">← 一覧</button>
    <div style="text-align:center">
      <div class="hdr-sub">Session</div>
      <div class="hdr-title" id="session-hdr-title">新しい面談</div>
    </div>
    <button class="hdr-btn" onclick="saveSession()">保存</button>
  </div>

  <div class="card">
    <div class="sec-lbl">セッション情報</div>
    <div class="field"><label>実施日</label><input type="date" id="sessionDate"></div>
    <div class="field"><label>CC（キャリアコンサルタント）</label><input type="text" id="ccName" placeholder="氏名を入力"></div>
    <div class="field"><label>CL（クライアント）</label><input type="text" id="clName" placeholder="氏名 or イニシャル"></div>
  </div>

  <div class="card">
    <div class="sec-lbl">タイマー &amp; 録音</div>
    <div class="timer-num" id="timerDisplay">15:00</div>
    <div class="timer-bar-bg"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="timer-lbl" id="timerLbl">15分カウントダウン</div>
    <div class="btn-row">
      <button class="btn" id="timerBtn" onclick="toggleTimer()">⏱ タイマー</button>
      <button class="btn" id="recBtn" onclick="toggleRec()">🎤 録音</button>
    </div>
    <button class="btn btn-full" id="bothBtn" onclick="startBoth()" style="margin-bottom:8px;background:var(--cc-bg);border-color:var(--ac-bd);color:var(--ac);font-weight:700">⏱🎤 同時スタート</button>
    <button class="btn btn-full btn-danger" onclick="resetTimer()" style="margin-bottom:0">↺ タイマーリセット</button>
    <div class="status" id="statusBar">
      <span class="status-dot"></span>
      <span id="statusTxt">タイマーまたは録音を開始してください</span>
    </div>
    <div class="speaker-bar" id="speakerBar" style="display:none">
      <div class="speaker-label">現在の発言者</div>
      <div class="speaker-name cc" id="speakerName">CC</div>
      <button class="switch-btn to-cl" id="switchBtn" onclick="switchSpeaker()">CLに切替</button>
    </div>
    <div class="live-text" id="liveText"></div>
  </div>

  <div class="card">
    <div class="sec-lbl">操作</div>
    <button class="action-btn" id="correctBtn" onclick="showCorrection()" disabled>⇄ ラベルずれを一括訂正</button>
    <button class="action-btn" onclick="addRow()">＋ 行を手動追加</button>
    <button class="action-btn" id="pdfBtn" onclick="downloadPdf()" disabled>↓ PDF出力</button>
  </div>

  <div class="corr-bar" id="corrBar">
    <div class="corr-txt"><strong>一括訂正：</strong>何番目以降が入れ替わっていますか？</div>
    <select class="corr-sel" id="corrFrom"><option value="">番号を選択</option></select>
    <button class="corr-apply" onclick="applyCorrection()">訂正</button>
    <button class="corr-close" onclick="hideCorrection()">✕</button>
  </div>

  <div class="card">
    <div class="transcript-hdr">
      <span class="transcript-title">逐語録</span>
      <span class="count-badge" id="entryCounter">—</span>
    </div>
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🎙</div>
      <div class="empty-text">録音すると逐語録が自動で入力されます<br>手動で行を追加することもできます</div>
    </div>
    <div id="tableWrap" style="display:none">
      <div id="entryList"></div>
      <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>
    </div>
  </div>

  <div class="card">
    <div class="memo-hdr" onclick="toggleMemo()">
      <span class="memo-hdr-txt">📝 総合メモ・フィードバック</span>
      <span class="memo-toggle" id="memoToggle">▼</span>
    </div>
    <div class="memo-body" id="memoBody">
      <textarea class="memo-ta" id="memoText" placeholder="全体を通じての気づき、改善点、良かった点などを記録…"></textarea>
    </div>
  </div>
</div>

<!-- Timer end modal -->
<div class="modal-ov" id="timerModal">
  <div class="modal-box">
    <div class="modal-big">⏰</div>
    <div class="modal-msg">15分が経過しました</div>
    <button class="btn btn-primary btn-full" onclick="dismissModal()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'caricon_sessions_v2';
function loadSessions() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveSessions(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

let sessions = loadSessions();
let currentSessionId = null;
let entries = [];
let nextId = 1;
const TIMER_DURATION = 15 * 60;
let timerSecondsLeft = TIMER_DURATION;
let isTimerRunning = false;
let timerInterval = null;
let isRecording = false;
let mediaRecorder = null;
let speechRecognition = null;
let currentSpeaker = 'CC';

document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];
renderSessionList();

function renderSessionList() {
  const wrap = document.getElementById('session-list-wrap');
  if (sessions.length === 0) {
    wrap.innerHTML = '<div class="empty-state" style="padding-top:80px"><div class="empty-icon">📋</div><div class="empty-text">面談記録がまだありません<br>「＋ 新しい面談」から始めましょう</div></div>';
    return;
  }
  wrap.innerHTML = sessions.slice().reverse().map(s => `
    <div class="session-item" onclick="openSession('${s.id}')">
      <div class="session-item-left">
        <div class="session-date">${s.date || '日付未設定'}</div>
        <div class="session-names">CC: ${s.ccName || '未設定'} ／ CL: ${s.clName || '未設定'}</div>
        <div class="session-count">${s.entries ? s.entries.length : 0} 件の発言</div>
      </div>
      <button class="session-del" onclick="event.stopPropagation();deleteSession('${s.id}')">🗑</button>
      <span class="session-arrow">›</span>
    </div>
  `).join('');
}

function newSession() {
  currentSessionId = 'session_' + Date.now();
  entries = []; nextId = 1;
  resetTimerFull();
  stopRec();
  document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('ccName').value = '';
  document.getElementById('clName').value = '';
  document.getElementById('memoText').value = '';
  document.getElementById('session-hdr-title').textContent = '新しい面談';
  renderEntries();
  showPage('page-session');
}

function openSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  currentSessionId = id;
  entries = (s.entries || []).map(e => ({...e}));
  nextId = entries.length > 0 ? Math.max(...entries.map(e => e.id)) + 1 : 1;
  document.getElementById('sessionDate').value = s.date || '';
  document.getElementById('ccName').value = s.ccName || '';
  document.getElementById('clName').value = s.clName || '';
  document.getElementById('memoText').value = s.memo || '';
  document.getElementById('session-hdr-title').textContent = s.date || '面談記録';
  resetTimerFull();
  renderEntries();
  showPage('page-session');
}

function deleteSession(id) {
  if (!confirm('この面談記録を削除しますか？')) return;
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  renderSessionList();
  toast('削除しました');
}

function saveSession() {
  const date = document.getElementById('sessionDate').value;
  const ccName = document.getElementById('ccName').value;
  const clName = document.getElementById('clName').value;
  const memo = document.getElementById('memoText').value;
  const data = { id: currentSessionId, date, ccName, clName, memo, entries: entries.map(e => ({...e})), savedAt: Date.now() };
  const idx = sessions.findIndex(s => s.id === currentSessionId);
  if (idx >= 0) sessions[idx] = data; else sessions.push(data);
  saveSessions(sessions);
  toast('保存しました ✓');
}

function backToList() {
  stopAll();
  showPage('page-list');
  renderSessionList();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// Timer
function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0')+':'+( s%60).toString().padStart(2,'0'); }

function updateTimerUI() {
  const d = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  const lbl = document.getElementById('timerLbl');
  bar.style.width = (timerSecondsLeft / TIMER_DURATION * 100) + '%';
  d.textContent = fmt(timerSecondsLeft);
  if (timerSecondsLeft <= 60 && isTimerRunning) {
    d.className='timer-num warning'; bar.className='timer-bar warning';
    lbl.textContent = '残り ' + timerSecondsLeft + '秒';
  } else if (isTimerRunning) {
    d.className='timer-num active'; bar.className='timer-bar';
    lbl.textContent = '残り ' + fmt(timerSecondsLeft);
  } else {
    d.className='timer-num'; bar.className='timer-bar';
    lbl.textContent = timerSecondsLeft === TIMER_DURATION ? '15分カウントダウン' : '一時停止中 — ' + fmt(timerSecondsLeft);
  }
}

function toggleTimer() {
  if (isTimerRunning) {
    clearInterval(timerInterval);
    isTimerRunning = false;
    document.getElementById('timerBtn').textContent = '⏱ 再開';
    setStatus('','一時停止中');
    updateTimerUI();
  } else {
    startCountdown();
  }
}

function startCountdown() {
  if (isTimerRunning) return;
  isTimerRunning = true;
  document.getElementById('timerBtn').textContent = '⏸ 一時停止';
  document.getElementById('bothBtn').disabled = true;
  timerInterval = setInterval(() => {
    timerSecondsLeft--;
    updateTimerUI();
    if (timerSecondsLeft <= 0) { clearInterval(timerInterval); isTimerRunning = false; onTimerEnd(); }
  }, 1000);
  setStatus('timer','タイマー動作中 — ' + fmt(timerSecondsLeft));
  updateTimerUI();
}

function resetTimer() {
  // 一時停止のみ（時間リセットなし）→ ↺ ボタンは完全リセット
  resetTimerFull();
}

function resetTimerFull() {
  clearInterval(timerInterval);
  isTimerRunning = false;
  timerSecondsLeft = TIMER_DURATION;
  document.getElementById('timerBtn').textContent = '⏱ タイマー';
  document.getElementById('bothBtn').disabled = false;
  updateTimerUI();
}

function onTimerEnd() {
  beep();
  document.getElementById('timerModal').classList.add('show');
  if (isRecording) stopRec();
  setStatus('done','タイマー終了');
  document.getElementById('timerBtn').textContent = '⏱ タイマー';
  document.getElementById('bothBtn').disabled = false;
}

function dismissModal() { document.getElementById('timerModal').classList.remove('show'); }

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.0);
  } catch(e) {}
}

// Recording
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => {};
    mediaRecorder.onstop = () => stream.getTracks().forEach(t => t.stop());
    mediaRecorder.start(1000);
    isRecording = true;
    startSpeechRecognition();
    return true;
  } catch(e) {
    toast('マイクへのアクセスが許可されていません');
    return false;
  }
}

function stopRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (speechRecognition) { try { speechRecognition.stop(); } catch(e) {} speechRecognition = null; }
  document.getElementById('liveText').classList.remove('show');
  document.getElementById('speakerBar').style.display = 'none';
}

async function toggleRec() {
  if (isRecording) {
    stopRec();
    document.getElementById('recBtn').textContent = '🎤 録音';
    document.getElementById('recBtn').className = 'btn';
    document.getElementById('bothBtn').disabled = false;
    setStatus('done','録音停止');
  } else {
    const ok = await startRec();
    if (!ok) return;
    document.getElementById('recBtn').textContent = '🎤 停止';
    document.getElementById('recBtn').className = 'btn btn-danger';
    document.getElementById('bothBtn').disabled = true;
    setStatus('rec','録音中… マイク ON');
    showSpeakerBar();
  }
}

async function startBoth() {
  if (isTimerRunning || isRecording) return;
  const ok = await startRec();
  if (!ok) return;
  startCountdown();
  document.getElementById('recBtn').textContent = '🎤 停止';
  document.getElementById('recBtn').className = 'btn btn-danger';
  document.getElementById('bothBtn').disabled = true;
  setStatus('rec','録音中 + タイマー動作中');
  showSpeakerBar();
}

function stopAll() {
  stopRec();
  if (isTimerRunning) { clearInterval(timerInterval); isTimerRunning = false; }
  document.getElementById('recBtn').textContent = '🎤 録音';
  document.getElementById('recBtn').className = 'btn';
  document.getElementById('timerBtn').textContent = '⏱ タイマー';
  document.getElementById('bothBtn').disabled = false;
}

// Speaker
function showSpeakerBar() {
  currentSpeaker = 'CC';
  updateSpeakerBar();
  document.getElementById('speakerBar').style.display = 'flex';
}

function updateSpeakerBar() {
  const ccN = document.getElementById('ccName').value || 'CC';
  const clN = document.getElementById('clName').value || 'CL';
  const bar = document.getElementById('speakerBar');
  const nameEl = document.getElementById('speakerName');
  const btn = document.getElementById('switchBtn');
  if (currentSpeaker === 'CC') {
    bar.className='speaker-bar is-cc'; nameEl.className='speaker-name cc';
    nameEl.textContent='CC（'+ccN+'）'; btn.className='switch-btn to-cl'; btn.textContent='CL に切替';
  } else {
    bar.className='speaker-bar is-cl'; nameEl.className='speaker-name cl';
    nameEl.textContent='CL（'+clN+'）'; btn.className='switch-btn to-cc'; btn.textContent='CC に切替';
  }
}

function switchSpeaker() {
  currentSpeaker = currentSpeaker === 'CC' ? 'CL' : 'CC';
  updateSpeakerBar();
  toast(currentSpeaker + ' に切り替えました');
}

// Speech
function startSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  speechRecognition = new SR();
  speechRecognition.lang = 'ja-JP';
  speechRecognition.continuous = true;
  speechRecognition.interimResults = true;
  const liveEl = document.getElementById('liveText');
  liveEl.classList.add('show');
  let finalBuffer = '';
  let silenceTimer = null;
  speechRecognition.onresult = (event) => {
    let interim='', final='';
    for (let i=event.resultIndex; i<event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t; else interim += t;
    }
    if (interim) liveEl.textContent = '🎤 ' + interim;
    if (final.trim()) {
      finalBuffer += final;
      liveEl.textContent = '✓ ' + finalBuffer;
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        if (finalBuffer.trim()) {
          entries.push({ id: nextId++, label: currentSpeaker, text: finalBuffer.trim(), notes: '', advice: '' });
          renderEntries(); enableBtns();
          finalBuffer = ''; liveEl.textContent = '';
        }
      }, 1800);
    }
  };
  speechRecognition.onerror = () => {};
  speechRecognition.onend = () => { if (isRecording) try { speechRecognition.start(); } catch(e) {} };
  try { speechRecognition.start(); } catch(e) {}
}

// Entries
function renderEntries() {
  const empty = document.getElementById('emptyState');
  const wrap = document.getElementById('tableWrap');
  const counter = document.getElementById('entryCounter');
  if (entries.length === 0) { empty.style.display='block'; wrap.style.display='none'; counter.textContent='—'; return; }
  empty.style.display='none'; wrap.style.display='block'; counter.textContent=entries.length+' 件';
  document.getElementById('entryList').innerHTML = entries.map((e,i) => `
    <div class="entry-card" id="ec-${e.id}">
      <div class="entry-top">
        <span class="entry-no">${String(i+1).padStart(2,'0')}</span>
        <button class="label-pill ${e.label}" onclick="toggleLabel(${e.id})">${e.label}</button>
        <button class="del-btn" onclick="delEntry(${e.id})">✕</button>
      </div>
      <textarea class="entry-ta" rows="3" oninput="updateField(${e.id},'text',this.value)" placeholder="逐語録">${esc(e.text)}</textarea>
      <div class="entry-div"></div>
      <div class="entry-sublbl">気づき・改善案</div>
      <textarea class="entry-ta sub" rows="2" oninput="updateField(${e.id},'notes',this.value)" placeholder="気づき・改善案・新案">${esc(e.notes)}</textarea>
      <div class="entry-div"></div>
      <div class="entry-sublbl">アドバイス</div>
      <textarea class="entry-ta adv" rows="2" oninput="updateField(${e.id},'advice',this.value)" placeholder="アドバイス">${esc(e.advice)}</textarea>
    </div>
  `).join('');
  const sel = document.getElementById('corrFrom');
  sel.innerHTML = '<option value="">番号を選択</option>' +
    entries.map((e,i) => `<option value="${i}">${String(i+1).padStart(2,'0')} (${e.label}): ${e.text.slice(0,18)}…</option>`).join('');
}

function esc(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function addRow() { entries.push({id:nextId++,label:currentSpeaker||'CC',text:'',notes:'',advice:''}); renderEntries(); enableBtns(); }
function toggleLabel(id) { const e=entries.find(e=>e.id===id); if(e){e.label=e.label==='CC'?'CL':'CC'; renderEntries();} }
function updateField(id,field,val) { const e=entries.find(e=>e.id===id); if(e) e[field]=val; }
function delEntry(id) { if(!confirm('この行を削除しますか？')) return; entries=entries.filter(e=>e.id!==id); renderEntries(); }
function enableBtns() { document.getElementById('pdfBtn').disabled=false; document.getElementById('correctBtn').disabled=false; }

// Correction
function showCorrection() { document.getElementById('corrBar').classList.add('show'); }
function hideCorrection() { document.getElementById('corrBar').classList.remove('show'); }
function applyCorrection() {
  const from=parseInt(document.getElementById('corrFrom').value);
  if(isNaN(from)){toast('番号を選択してください');return;}
  for(let i=from;i<entries.length;i++) entries[i].label=entries[i].label==='CC'?'CL':'CC';
  renderEntries(); hideCorrection(); toast((from+1)+'番目以降のラベルを入れ替えました ✓');
}

// Memo
function toggleMemo() {
  document.getElementById('memoBody').classList.toggle('open');
  document.getElementById('memoToggle').classList.toggle('open');
}

// Status
function setStatus(type,text) {
  document.getElementById('statusBar').className='status'+(type?' '+type:'');
  document.getElementById('statusTxt').textContent=text;
}

// PDF
async function downloadPdf() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4',orientation:'landscape'});
  const date=document.getElementById('sessionDate').value;
  const ccName=document.getElementById('ccName').value||'CC';
  const clName=document.getElementById('clName').value||'CL';
  const memo=document.getElementById('memoText').value;
  const pageW=297,pageH=210,mL=10,mR=10,mT=14,mB=10;
  const contentW=pageW-mL-mR;
  const colNo=12,colTr=90,colNt=80,colAd=contentW-colNo-colTr-colNt;
  let y=mT;
  function checkPage(h=12){if(y+h>pageH-mB){doc.addPage();y=mT;drawHdr(y);y+=10;}}
  function drawHdr(ty){
    doc.setFillColor(242,242,240);doc.rect(mL,ty,contentW,9,'F');
    doc.setDrawColor(200,200,195);doc.setLineWidth(0.4);doc.rect(mL,ty,contentW,9,'S');
    doc.setTextColor(100,100,95);doc.setFontSize(8);doc.setFont('helvetica','bold');
    doc.text('NO.',mL+colNo/2,ty+5.5,{align:'center'});
    doc.text('逐語録',mL+colNo+colTr/2,ty+5.5,{align:'center'});
    doc.text('気づき・改善案・新案',mL+colNo+colTr+colNt/2,ty+5.5,{align:'center'});
    doc.text('アドバイス',mL+colNo+colTr+colNt+colAd/2,ty+5.5,{align:'center'});
    [colNo,colNo+colTr,colNo+colTr+colNt].forEach(x=>doc.line(mL+x,ty,mL+x,ty+9));
  }
  doc.setFillColor(255,255,255);doc.rect(0,0,pageW,12,'F');
  doc.setDrawColor(220,220,215);doc.setLineWidth(0.4);doc.line(0,12,pageW,12);
  doc.setTextColor(80,60,20);doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('面談記録',mL,8);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(120,118,110);
  doc.text('実施日：'+date,mL+35,8);doc.text('CC：'+ccName,mL+90,8);doc.text('CL：'+clName,mL+135,8);
  y=14;drawHdr(y);y+=10;
  entries.forEach((e,i)=>{
    const trl=doc.splitTextToSize(e.text||'',colTr-6);
    const ntl=doc.splitTextToSize(e.notes||'',colNt-4);
    const adl=doc.splitTextToSize(e.advice||'',colAd-4);
    const rowH=Math.max(trl.length,ntl.length,adl.length,2)*4.5+5;
    checkPage(rowH);
    doc.setFillColor(i%2===0?252:246,i%2===0?252:246,i%2===0?250:243);doc.rect(mL,y,contentW,rowH,'F');
    doc.setDrawColor(210,210,205);doc.setLineWidth(0.2);doc.rect(mL,y,contentW,rowH,'S');
    [colNo,colNo+colTr,colNo+colTr+colNt].forEach(x=>doc.line(mL+x,y,mL+x,y+rowH));
    doc.setTextColor(160,158,150);doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.text(String(i+1).padStart(2,'0'),mL+colNo/2,y+rowH/2+1,{align:'center'});
    const lc=e.label==='CC'?[45,122,94]:[90,74,142];
    doc.setFillColor(...lc);doc.roundedRect(mL+colNo+2,y+2,14,5,1,1,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(7);doc.setFont('helvetica','bold');
    doc.text(e.label,mL+colNo+9,y+5.8,{align:'center'});
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(30,30,28);
    trl.forEach((l,li)=>doc.text(l,mL+colNo+2,y+9+li*4.5));
    doc.setTextColor(80,80,75);ntl.forEach((l,li)=>doc.text(l,mL+colNo+colTr+2,y+4+li*4.5));
    doc.setTextColor(130,85,20);adl.forEach((l,li)=>doc.text(l,mL+colNo+colTr+colNt+2,y+4+li*4.5));
    y+=rowH;
  });
  if(memo.trim()){
    y+=6;checkPage(20);
    const ml=doc.splitTextToSize(memo,contentW-8);
    const mh=ml.length*5+12;
    doc.setFillColor(253,249,240);doc.setDrawColor(200,180,130);doc.setLineWidth(0.3);doc.rect(mL,y,contentW,mh,'FD');
    doc.setTextColor(130,100,40);doc.setFontSize(8);doc.setFont('helvetica','bold');doc.text('総合メモ・フィードバック',mL+4,y+6);
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(60,50,30);
    ml.forEach((l,li)=>doc.text(l,mL+4,y+12+li*5));
  }
  const pages=doc.internal.getNumberOfPages();
  for(let p=1;p<=pages;p++){doc.setPage(p);doc.setFontSize(8);doc.setTextColor(180,178,170);doc.text(p+'/'+pages,pageW-mR,pageH-4,{align:'right'});}
  doc.save('面談記録_'+(date||'').replace(/-/g,'')+'.pdf');
  toast('PDFを出力しました ✦');
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
