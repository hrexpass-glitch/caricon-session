<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面談記録メーカー｜キャリコン ロープレ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Shippori+Mincho+B1:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #0f0f14;
  --surface: #17171f;
  --surface2: #1e1e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e6f0;
  --text-muted: #7a7890;
  --text-dim: #4a4860;
  --cc: #7eb8a4;
  --cc-bg: rgba(126,184,164,0.1);
  --cc-border: rgba(126,184,164,0.3);
  --cl: #a89bce;
  --cl-bg: rgba(168,155,206,0.1);
  --cl-border: rgba(168,155,206,0.3);
  --accent: #e8c07d;
  --accent-dim: rgba(232,192,125,0.15);
  --red: #e07d7d;
  --red-dim: rgba(224,125,125,0.12);
  --green: #7eb8a4;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  font-size: 14px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.app {
  display: grid;
  grid-template-columns: 300px 1fr;
  min-height: 100vh;
}

/* ─── Sidebar ─── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.logo { display: flex; flex-direction: column; gap: 4px; }
.logo-sub { font-size: 9px; letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase; }
.logo-title { font-family: 'Shippori Mincho B1', serif; font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: 0.05em; }

.divider { height: 1px; background: var(--border); }
.section-label { font-size: 9px; letter-spacing: 0.3em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }

.meta-field { margin-bottom: 12px; }
.meta-field label { display: block; font-size: 10px; color: var(--text-muted); margin-bottom: 5px; letter-spacing: 0.1em; }
.meta-field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 10px; font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s;
}
.meta-field input:focus { border-color: var(--accent); }
.meta-field input::placeholder { color: var(--text-dim); }

/* ─── Timer ─── */
.timer-section { display: flex; flex-direction: column; gap: 10px; }

.timer-display {
  text-align: center;
  font-size: 32px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-family: 'Shippori Mincho B1', serif;
  padding: 8px 0;
  transition: color 0.3s;
}
.timer-display.active { color: var(--accent); }
.timer-display.warning { color: var(--red); animation: timerPulse 1s infinite; }
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

.timer-progress-wrap {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.timer-progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 1s linear, background 0.3s;
  width: 100%;
}
.timer-progress-bar.warning { background: var(--red); }

.timer-label {
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

/* ─── Control Buttons ─── */
.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.btn-grid-full { grid-column: 1 / -1; }

.ctrl-btn {
  padding: 11px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text-muted);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
  letter-spacing: 0.03em;
  white-space: nowrap;
}
.ctrl-btn:hover:not(:disabled) { background: var(--surface2); border-color: var(--border2); color: var(--text); }
.ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.ctrl-btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a1200;
  font-weight: 700;
}
.ctrl-btn.primary:hover:not(:disabled) { background: #f0cd8e; }

.ctrl-btn.danger {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}
.ctrl-btn.danger:hover:not(:disabled) { background: rgba(224,125,125,0.2); }

.ctrl-btn.both {
  background: linear-gradient(135deg, rgba(126,184,164,0.15), rgba(232,192,125,0.15));
  border-color: rgba(232,192,125,0.4);
  color: var(--accent);
  font-weight: 700;
}
.ctrl-btn.both:hover:not(:disabled) { background: linear-gradient(135deg, rgba(126,184,164,0.25), rgba(232,192,125,0.25)); }

.rec-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-dim);
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 6px;
  border: 1px solid var(--border);
}
.rec-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}
.rec-indicator.recording-active .rec-dot {
  background: var(--red);
  animation: pulse 1s infinite;
}
.rec-indicator.timer-active .rec-dot { background: var(--accent); animation: pulse 1s infinite; }
.rec-indicator.both-active .rec-dot { background: var(--green); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

/* ─── Live transcript preview ─── */
.live-text {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  min-height: 40px;
  line-height: 1.6;
  font-style: italic;
  display: none;
}
.live-text.show { display: block; }

/* ─── Action buttons ─── */
.action-group { display: flex; flex-direction: column; gap: 7px; margin-top: auto; }
.action-btn {
  width: 100%; padding: 9px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 8px; letter-spacing: 0.03em;
}
.action-btn:hover:not(:disabled) { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ─── Main ─── */
.main {
  padding: 32px 36px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.status-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 12px; color: var(--text-muted);
}
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
.status-bar.recording-active .status-dot { background: var(--red); animation: pulse 1s infinite; }
.status-bar.done .status-dot { background: var(--cc); }
.status-bar.timer-active .status-dot { background: var(--accent); animation: pulse 1s infinite; }

/* correction banner */
.correction-banner {
  background: var(--accent-dim); border: 1px solid rgba(232,192,125,0.25);
  border-radius: var(--radius); padding: 14px 18px; display: none;
  gap: 12px; align-items: center; flex-wrap: wrap;
}
.correction-banner.show { display: flex; }
.correction-banner-text { font-size: 12px; color: var(--accent); flex: 1; min-width: 200px; }
.correction-banner-text strong { font-weight: 700; }
.correction-select {
  background: var(--surface2); border: 1px solid rgba(232,192,125,0.3);
  border-radius: 6px; color: var(--text); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; padding: 6px 10px; outline: none; cursor: pointer;
}
.correction-apply {
  padding: 7px 16px; border-radius: 6px; border: 1px solid var(--accent);
  background: var(--accent-dim); color: var(--accent); font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.correction-apply:hover { background: rgba(232,192,125,0.25); }
.correction-close { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 16px; }

/* ─── Table View (メインの逐語録テーブル) ─── */
.transcript-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
}
.transcript-title { font-family: 'Shippori Mincho B1', serif; font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
.entry-counter { font-size: 11px; color: var(--text-dim); }

.transcript-empty { text-align: center; padding: 80px 20px; color: var(--text-dim); }
.transcript-empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
.transcript-empty-text { font-size: 13px; line-height: 1.8; }

/* Table layout */
.record-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.record-table th {
  background: var(--surface);
  border: 1px solid var(--border2);
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-align: center;
  white-space: nowrap;
}
.record-table td {
  border: 1px solid var(--border);
  padding: 10px 10px;
  vertical-align: top;
  background: var(--surface);
}
.record-table tr:hover td { background: var(--surface2); }

.col-no { width: 44px; text-align: center; color: var(--text-dim); font-size: 12px; }
.col-transcript { min-width: 200px; }
.col-notes { min-width: 160px; }
.col-advice { min-width: 120px; }
.col-del { width: 36px; text-align: center; }

.cell-editable {
  width: 100%;
  min-height: 48px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  line-height: 1.75;
  resize: none;
  outline: none;
  cursor: text;
  display: block;
  padding: 0;
}
.cell-editable:focus {
  background: rgba(255,255,255,0.03);
  border-radius: 3px;
  padding: 2px 4px;
  margin: -2px -4px;
}
.cell-editable::placeholder { color: var(--text-dim); }

.transcript-cell-wrap { display: flex; flex-direction: column; gap: 6px; }

.label-btn {
  display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  cursor: pointer; border: 1px solid; transition: all 0.15s;
  white-space: nowrap; width: fit-content;
}
.label-btn.CC { background: var(--cc-bg); border-color: var(--cc-border); color: var(--cc); }
.label-btn.CC:hover { background: rgba(126,184,164,0.2); }
.label-btn.CL { background: var(--cl-bg); border-color: var(--cl-border); color: var(--cl); }
.label-btn.CL:hover { background: rgba(168,155,206,0.2); }

.del-btn {
  background: transparent; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; padding: 3px; border-radius: 4px;
  transition: all 0.15s; line-height: 1;
}
.del-btn:hover { background: var(--surface2); color: var(--red); }

/* add row btn */
.add-row-btn {
  margin-top: 12px;
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px dashed var(--border2);
  background: transparent;
  color: var(--text-dim);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* memo section */
.memo-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.memo-header {
  padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s;
}
.memo-header:hover { background: var(--surface2); }
.memo-header-left { display: flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; }
.memo-toggle { color: var(--text-dim); font-size: 12px; transition: transform 0.2s; }
.memo-toggle.open { transform: rotate(180deg); }
.memo-body { padding: 16px 18px; display: none; }
.memo-body.open { display: block; }
.memo-textarea {
  width: 100%; min-height: 100px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 13px; color: var(--text);
  resize: vertical; outline: none; line-height: 1.7; transition: border-color 0.2s;
}
.memo-textarea:focus { border-color: var(--border2); }
.memo-textarea::placeholder { color: var(--text-dim); }

/* loading */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(15,15,20,0.85);
  backdrop-filter: blur(4px); z-index: 100; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
}
.loading-overlay.show { display: flex; }
.loading-spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text-muted); letter-spacing: 0.1em; }

/* toast */
.toast {
  position: fixed; bottom: 32px; right: 32px; background: var(--surface2);
  border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px 18px;
  font-size: 13px; color: var(--text); z-index: 200; opacity: 0;
  transform: translateY(8px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }

/* countdown modal */
.countdown-modal {
  display: none; position: fixed; inset: 0; background: rgba(15,15,20,0.9);
  backdrop-filter: blur(8px); z-index: 150; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.countdown-modal.show { display: flex; }
.countdown-big { font-family: 'Shippori Mincho B1', serif; font-size: 72px; color: var(--accent); }
.countdown-msg { font-size: 16px; color: var(--text-muted); letter-spacing: 0.1em; }

@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 20px 16px; }
  .record-table th, .record-table td { padding: 7px 6px; font-size: 12px; }
  .col-notes, .col-advice { min-width: 90px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-sub">Career Counseling</span>
      <span class="logo-title">面談記録メーカー</span>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">セッション情報</div>
      <div class="meta-field">
        <label>実施日</label>
        <input type="date" id="sessionDate">
      </div>
      <div class="meta-field">
        <label>CC（キャリアコンサルタント）</label>
        <input type="text" id="ccName" placeholder="氏名を入力">
      </div>
      <div class="meta-field">
        <label>CL（クライアント）</label>
        <input type="text" id="clName" placeholder="氏名 or イニシャル">
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-label">タイマー &amp; 録音</div>

      <div class="timer-section">
        <div class="timer-display" id="timerDisplay">15:00</div>
        <div class="timer-progress-wrap">
          <div class="timer-progress-bar" id="timerBar"></div>
        </div>
        <div class="timer-label" id="timerLabel">15分カウントダウン</div>
      </div>

      <!-- プリセットボタン -->
      <div style="height:8px"></div>
      <div class="btn-grid">
        <button class="ctrl-btn" id="preset15Btn" onclick="setPreset(15)">⏱ 15分 国キャリ</button>
        <button class="ctrl-btn" id="preset30Btn" onclick="setPreset(30)">⏱ 30分 1級・2級</button>
      </div>

      <!-- カスタムスライダー -->
      <div style="height:8px"></div>
      <div style="font-size:10px;color:var(--text-dim);margin-bottom:4px;letter-spacing:0.08em;">カスタム時間（分）</div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="range" id="timerSlider" min="1" max="30" value="15"
          style="flex:1;accent-color:var(--accent);cursor:pointer;"
          oninput="onSliderChange(this.value)">
        <span id="sliderVal" style="font-size:13px;color:var(--accent);font-weight:700;min-width:28px;text-align:right;">15分</span>
      </div>

      <div style="height:12px"></div>

      <!-- スタート／停止ボタン -->
      <button class="ctrl-btn both" id="startBtn" onclick="startAll()" style="width:100%;padding:14px;">▶ スタート（タイマー＋録音＋文字起こし）</button>
      <div style="height:8px"></div>
      <button class="ctrl-btn danger" id="stopBtn" onclick="stopAll()" disabled style="width:100%;padding:14px;">■ 停止</button>

      <div style="height:10px"></div>
      <div class="rec-indicator" id="recIndicator">
        <span class="rec-dot"></span>
        <span id="recIndicatorText">待機中</span>
      </div>

      <div style="height:8px"></div>
      <div class="live-text" id="liveText"></div>
    </div>

    <div class="divider"></div>

    <div class="action-group">
      <button class="action-btn" id="correctBtn" onclick="showCorrection()" disabled>
        ⇄ ラベルずれを一括訂正
      </button>
      <button class="action-btn" onclick="addRow()">
        ＋ 行を追加
      </button>
      <button class="action-btn" id="pdfBtn" onclick="downloadPdf()" disabled>
        ↓ PDF出力（面談記録）
      </button>
      <button class="action-btn" id="txtBtn" onclick="downloadTxt()" disabled>
        ↓ テキストDL (.txt)
      </button>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main class="main">

    <div class="status-bar" id="statusBar">
      <span class="status-dot"></span>
      <span id="statusText">タイマーまたは録音を開始してください</span>
    </div>

    <!-- correction banner -->
    <div class="correction-banner" id="correctionBanner">
      <div class="correction-banner-text">
        <strong>ラベル一括訂正：</strong> 何番目以降のCC↔CLが入れ替わっていますか？
      </div>
      <select class="correction-select" id="correctionFrom">
        <option value="">番号を選択</option>
      </select>
      <button class="correction-apply" onclick="applyCorrection()">訂正する</button>
      <button class="correction-close" onclick="hideCorrection()">✕</button>
    </div>

    <!-- Transcript Table -->
    <div>
      <div class="transcript-header">
        <span class="transcript-title">逐語録</span>
        <span class="entry-counter" id="entryCounter">—</span>
      </div>

      <div id="emptyState" class="transcript-empty">
        <div class="transcript-empty-icon">🎙</div>
        <div class="transcript-empty-text">
          録音すると逐語録が自動で入力されます<br>
          手動で行を追加することもできます
        </div>
      </div>

      <div id="tableWrap" style="display:none;">
        <table class="record-table">
          <thead>
            <tr>
              <th class="col-no">番号</th>
              <th class="col-transcript">逐語録</th>
              <th class="col-notes">気づき・改善案・新案</th>
              <th class="col-advice">アドバイス</th>
              <th class="col-del"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addRow()">＋ 行を追加</button>
      </div>
    </div>

    <!-- Memo -->
    <div class="memo-section">
      <div class="memo-header" onclick="toggleMemo()">
        <div class="memo-header-left">📝 <span>総合メモ・フィードバック</span></div>
        <span class="memo-toggle" id="memoToggle">▼</span>
      </div>
      <div class="memo-body" id="memoBody">
        <textarea class="memo-textarea" id="memoText"
          placeholder="全体を通じての気づき、改善点、良かった点などを記録…"></textarea>
      </div>
    </div>

  </main>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">文字起こし処理中…</div>
</div>

<!-- Countdown modal -->
<div class="countdown-modal" id="countdownModal">
  <div class="countdown-big" id="countdownNum">時間終了</div>
  <div class="countdown-msg">15分が経過しました</div>
  <button class="ctrl-btn primary" style="margin-top:12px;padding:12px 32px;" onclick="dismissCountdown()">閉じる</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── State ───
let mediaRecorder = null;
let allAudioChunks = []; // 全セッション通じてチャンクを蓄積
let isRecording = false;
let timerInterval = null;
let timerCountdown = null;
let elapsedSeconds = 0;
let TIMER_DURATION = 15 * 60; // デフォルト15分、変更可能
let timerSecondsLeft = TIMER_DURATION;
let isTimerRunning = false;
let audioBlob = null;
let entries = []; // {id, label, text, notes, advice}
let nextId = 1;
let speechRecognition = null;
let liveBuffer = '';

// ─── Init ───
document.getElementById('sessionDate').value = new Date().toISOString().split('T')[0];
updateTimerDisplay(TIMER_DURATION);

// ─── Preset & Slider ───
function setPreset(mins) {
  if (isTimerRunning) return;
  TIMER_DURATION = mins * 60;
  timerSecondsLeft = TIMER_DURATION;
  document.getElementById('timerSlider').value = mins;
  document.getElementById('sliderVal').textContent = mins + '分';
  updateTimerDisplay(TIMER_DURATION);
  showToast(`タイマーを${mins}分にセットしました`);
}

function onSliderChange(val) {
  if (isTimerRunning) return;
  const mins = parseInt(val);
  TIMER_DURATION = mins * 60;
  timerSecondsLeft = TIMER_DURATION;
  document.getElementById('sliderVal').textContent = mins + '分';
  updateTimerDisplay(TIMER_DURATION);
}

// ─── Timer ───
function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function updateTimerDisplay(secsLeft) {
  const disp = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerBar');
  const label = document.getElementById('timerLabel');

  disp.textContent = formatTime(secsLeft);
  const pct = (secsLeft / TIMER_DURATION) * 100;
  bar.style.width = pct + '%';

  if (secsLeft <= 60) {
    disp.className = 'timer-display active warning';
    bar.className = 'timer-progress-bar warning';
    label.textContent = '残り ' + secsLeft + '秒';
  } else if (isTimerRunning) {
    disp.className = 'timer-display active';
    bar.className = 'timer-progress-bar';
    label.textContent = '残り ' + formatTime(secsLeft);
  } else {
    disp.className = 'timer-display';
    bar.className = 'timer-progress-bar';
    label.textContent = '15分カウントダウン';
  }
}

function startCountdown() {
  if (isTimerRunning) return;
  isTimerRunning = true;
  timerSecondsLeft = TIMER_DURATION;

  timerCountdown = setInterval(() => {
    timerSecondsLeft--;
    updateTimerDisplay(timerSecondsLeft);
    if (timerSecondsLeft <= 0) {
      clearInterval(timerCountdown);
      isTimerRunning = false;
      onTimerEnd();
    }
  }, 1000);
}

function stopCountdown() {
  if (timerCountdown) clearInterval(timerCountdown);
  isTimerRunning = false;
  timerSecondsLeft = TIMER_DURATION;
  updateTimerDisplay(TIMER_DURATION);
}

function onTimerEnd() {
  document.getElementById('countdownModal').classList.add('show');
  if (isRecording) stopRecording();
  setStatus('done', 'タイマー終了 — 15分経過しました');
}

function dismissCountdown() {
  document.getElementById('countdownModal').classList.remove('show');
}

// ─── Recording ───
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    // 新規セッションの場合のみチャンクをリセット（再開時は蓄積）
    const sessionChunks = [];

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) {
        sessionChunks.push(e.data);
        allAudioChunks.push(e.data); // 全体にも蓄積
      }
    };
    mediaRecorder.onstop = () => {
      // 全チャンクを結合してblobを作成
      audioBlob = new Blob(allAudioChunks, { type: 'audio/webm' });
      stream.getTracks().forEach(t => t.stop());
      processRecording();
    };

    mediaRecorder.start(1000);
    isRecording = true;

    // Start Web Speech API for live transcription
    startSpeechRecognition();

    document.getElementById('pdfBtn').disabled = false;
    document.getElementById('txtBtn').disabled = false;

  } catch(e) {
    showToast('マイクへのアクセスが許可されていません');
    return false;
  }
  return true;
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (speechRecognition) {
    try { speechRecognition.stop(); } catch(e) {}
    speechRecognition = null;
  }
  document.getElementById('liveText').classList.remove('show');
}

// ─── Speech Recognition ───
function startSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  speechRecognition = new SR();
  speechRecognition.lang = 'ja-JP';
  speechRecognition.continuous = true;
  speechRecognition.interimResults = true;

  const liveEl = document.getElementById('liveText');
  liveEl.classList.add('show');

  let finalBuffer = '';
  let silenceTimer = null;
  let currentLabel = 'CC';

  speechRecognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) { final += t; }
      else { interim += t; }
    }

    if (interim) liveEl.textContent = '🎤 ' + interim;

    if (final.trim()) {
      finalBuffer += final;
      liveEl.textContent = '✓ ' + finalBuffer;

      // Auto-add entry after silence
      clearTimeout(silenceTimer);
      silenceTimer = setTimeout(() => {
        if (finalBuffer.trim()) {
          const ts = formatTime(TIMER_DURATION - timerSecondsLeft);
          addEntryFromRecording(currentLabel, finalBuffer.trim(), ts);
          // Alternate labels (heuristic)
          currentLabel = currentLabel === 'CC' ? 'CL' : 'CC';
          finalBuffer = '';
          liveEl.textContent = '';
        }
      }, 1800);
    }
  };

  speechRecognition.onerror = () => {};
  speechRecognition.onend = () => {
    // Restart if still recording
    if (isRecording && speechRecognition) {
      try { speechRecognition.start(); } catch(e) {}
    }
  };

  try { speechRecognition.start(); } catch(e) {}
}

function addEntryFromRecording(label, text, ts) {
  const entry = { id: nextId++, label, text, notes: '', advice: '' };
  entries.push(entry);
  renderTable();
  document.getElementById('pdfBtn').disabled = false;
  document.getElementById('txtBtn').disabled = false;
  document.getElementById('correctBtn').disabled = false;
}

function processRecording() {
  // If no entries from speech recognition, add demo data
  if (entries.length === 0) {
    showLoading(true);
    document.getElementById('loadingText').textContent = '文字起こし処理中…';
    setTimeout(() => {
      const demo = generateDemoTranscript();
      demo.forEach(d => entries.push({ id: nextId++, label: d.label, text: d.text, notes: '', advice: '' }));
      renderTable();
      showLoading(false);
      document.getElementById('pdfBtn').disabled = false;
      document.getElementById('txtBtn').disabled = false;
      document.getElementById('correctBtn').disabled = false;
      setStatus('done', `文字起こし完了 — ${entries.length}件の発言`);
      showToast('文字起こしが完了しました ✦');
    }, 1500);
  } else {
    setStatus('done', `録音完了 — ${entries.length}件の発言を取得`);
    showToast('録音が完了しました ✦');
  }
}

function generateDemoTranscript() {
  return [
    { label: 'CC', text: 'よろしくお願いします。今日はどのようなことをお話しいただけますか？' },
    { label: 'CL', text: 'ええと…最近、仕事のことでずっとモヤモヤしていて。転職するべきか、迷っているんです。' },
    { label: 'CC', text: 'そうですか。転職を考えていらっしゃるんですね。具体的には、どんなことがお気持ちの中にありますか？' },
    { label: 'CL', text: '今の会社、もう6年いるんですけど、なんか…成長してる実感がなくて。毎日同じことの繰り返しというか。' },
    { label: 'CC', text: '6年間ずっと続けてこられたんですね。成長の実感がないと感じはじめたのは、いつ頃からでしょうか？' },
    { label: 'CL', text: '去年くらいからかな。後輩が入ってきて、自分がちゃんと教えられてるのかも不安で。' },
  ];
}

// ─── Button Actions ───
async function startAll() {
  if (isTimerRunning || isRecording) return;
  const ok = await startRecording();
  if (!ok) return;
  startCountdown();
  setIndicator('both-active', '録音 ＋ タイマー ＋ 文字起こし 動作中');
  document.getElementById('startBtn').disabled = true;
  document.getElementById('preset15Btn').disabled = true;
  document.getElementById('preset30Btn').disabled = true;
  document.getElementById('timerSlider').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  setStatus('recording-active', '録音中 ＋ タイマー動作中 ＋ 文字起こし中');
  showToast('スタート！タイマー＋録音＋文字起こし ⏱🎤');
}

function stopAll() {
  if (isRecording) stopRecording();
  if (isTimerRunning) stopCountdown();
  allAudioChunks = [];
  setIndicator('', '停止済み');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('preset15Btn').disabled = false;
  document.getElementById('preset30Btn').disabled = false;
  document.getElementById('timerSlider').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  setStatus('done', '停止しました');
  showToast('停止しました');
}

function setIndicator(cls, text) {
  const ind = document.getElementById('recIndicator');
  ind.className = 'rec-indicator' + (cls ? ' ' + cls : '');
  document.getElementById('recIndicatorText').textContent = text;
}

// ─── Table render ───
function renderTable() {
  const empty = document.getElementById('emptyState');
  const wrap = document.getElementById('tableWrap');
  const counter = document.getElementById('entryCounter');

  if (entries.length === 0) {
    empty.style.display = 'block';
    wrap.style.display = 'none';
    counter.textContent = '—';
    return;
  }

  empty.style.display = 'none';
  wrap.style.display = 'block';
  counter.textContent = `${entries.length} 件`;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = entries.map((e, i) => `
    <tr id="row-${e.id}">
      <td class="col-no">${String(i+1).padStart(2,'0')}</td>
      <td class="col-transcript">
        <div class="transcript-cell-wrap">
          <button class="label-btn ${e.label}" onclick="toggleLabel(${e.id})">${e.label}</button>
          <textarea class="cell-editable" rows="3"
            onchange="updateField(${e.id},'text',this.value)"
            placeholder="逐語録（自動入力）">${escHtml(e.text)}</textarea>
        </div>
      </td>
      <td class="col-notes">
        <textarea class="cell-editable" rows="3"
          onchange="updateField(${e.id},'notes',this.value)"
          placeholder="気づき・改善案・新案">${escHtml(e.notes)}</textarea>
      </td>
      <td class="col-advice">
        <textarea class="cell-editable" rows="3"
          onchange="updateField(${e.id},'advice',this.value)"
          placeholder="アドバイス">${escHtml(e.advice)}</textarea>
      </td>
      <td class="col-del"><button class="del-btn" onclick="deleteEntry(${e.id})" title="削除">✕</button></td>
    </tr>
  `).join('');

  // Correction select
  const sel = document.getElementById('correctionFrom');
  sel.innerHTML = '<option value="">番号を選択</option>' +
    entries.map((e,i) => `<option value="${i}">${String(i+1).padStart(2,'0')} (${e.label}): ${e.text.slice(0,20)}…</option>`).join('');
}

function escHtml(t) {
  return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addRow() {
  entries.push({ id: nextId++, label: 'CC', text: '', notes: '', advice: '' });
  renderTable();
  document.getElementById('pdfBtn').disabled = false;
  document.getElementById('txtBtn').disabled = false;
  document.getElementById('correctBtn').disabled = false;
}

function toggleLabel(id) {
  const e = entries.find(e => e.id === id);
  if (e) { e.label = e.label === 'CC' ? 'CL' : 'CC'; renderTable(); }
}

function updateField(id, field, val) {
  const e = entries.find(e => e.id === id);
  if (e) e[field] = val;
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  renderTable();
}

// ─── Correction ───
function showCorrection() { document.getElementById('correctionBanner').classList.add('show'); }
function hideCorrection() { document.getElementById('correctionBanner').classList.remove('show'); }
function applyCorrection() {
  const fromIdx = parseInt(document.getElementById('correctionFrom').value);
  if (isNaN(fromIdx)) { showToast('発言番号を選択してください'); return; }
  for (let i = fromIdx; i < entries.length; i++) {
    entries[i].label = entries[i].label === 'CC' ? 'CL' : 'CC';
  }
  renderTable();
  hideCorrection();
  showToast(`${fromIdx+1}番目以降のラベルを入れ替えました ✓`);
}

// ─── Memo toggle ───
function toggleMemo() {
  document.getElementById('memoBody').classList.toggle('open');
  document.getElementById('memoToggle').classList.toggle('open');
}

// ─── PDF出力（面談記録フォーマット）───
async function downloadPdf() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });

  const date = document.getElementById('sessionDate').value;
  const ccName = document.getElementById('ccName').value || 'CC';
  const clName = document.getElementById('clName').value || 'CL';
  const memo = document.getElementById('memoText').value;

  const pageW = 297, pageH = 210;
  const mL = 10, mR = 10, mT = 14, mB = 10;
  const contentW = pageW - mL - mR;
  let y = mT;

  // Column widths
  const colNo = 12;
  const colTranscript = 90;
  const colNotes = 80;
  const colAdvice = contentW - colNo - colTranscript - colNotes;

  function checkPage(needed = 12) {
    if (y + needed > pageH - mB) {
      doc.addPage();
      y = mT;
      drawTableHeader(y);
      y += 10;
    }
  }

  function drawTableHeader(ty) {
    doc.setFillColor(40, 40, 55);
    doc.rect(mL, ty, contentW, 9, 'F');
    doc.setTextColor(200, 198, 220);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('NO.', mL + colNo/2, ty + 5.5, { align: 'center' });
    doc.text('逐語録', mL + colNo + colTranscript/2, ty + 5.5, { align: 'center' });
    doc.text('気づき・改善案・新案', mL + colNo + colTranscript + colNotes/2, ty + 5.5, { align: 'center' });
    doc.text('アドバイス', mL + colNo + colTranscript + colNotes + colAdvice/2, ty + 5.5, { align: 'center' });

    // Vertical dividers in header
    doc.setDrawColor(60, 60, 80);
    doc.setLineWidth(0.3);
    [colNo, colNo+colTranscript, colNo+colTranscript+colNotes].forEach(x => {
      doc.line(mL+x, ty, mL+x, ty+9);
    });
  }

  // ── Page 1 Header ──
  // Title bar
  doc.setFillColor(20, 20, 30);
  doc.rect(0, 0, pageW, 12, 'F');
  doc.setTextColor(232, 192, 125);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('面談記録', mL, 8);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(160, 155, 180);
  doc.text(`実施日：${date}`, mL + 35, 8);
  doc.text(`CC：${ccName}`, mL + 95, 8);
  doc.text(`CL：${clName}`, mL + 135, 8);

  y = 14;
  drawTableHeader(y);
  y += 10;

  // Entries
  entries.forEach((e, i) => {
    const ccLine = e.label === 'CC' ? `CC（${ccName}）` : `CL（${clName}）`;
    const transcriptLines = doc.splitTextToSize((ccLine + '\n' + e.text), colTranscript - 4);
    const notesLines = doc.splitTextToSize(e.notes || '', colNotes - 4);
    const adviceLines = doc.splitTextToSize(e.advice || '', colAdvice - 4);

    const rowLines = Math.max(transcriptLines.length, notesLines.length, adviceLines.length, 2);
    const rowH = rowLines * 4.5 + 5;

    checkPage(rowH);

    const rowY = y;

    // Row background alternating
    if (i % 2 === 0) {
      doc.setFillColor(22, 22, 32);
      doc.rect(mL, rowY, contentW, rowH, 'F');
    }

    // Borders
    doc.setDrawColor(50, 50, 65);
    doc.setLineWidth(0.2);
    doc.rect(mL, rowY, contentW, rowH, 'S');
    [colNo, colNo+colTranscript, colNo+colTranscript+colNotes].forEach(x => {
      doc.line(mL+x, rowY, mL+x, rowY+rowH);
    });

    // NO
    doc.setTextColor(100, 95, 130);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.text(String(i+1).padStart(2,'0'), mL + colNo/2, rowY + rowH/2 + 1, { align: 'center' });

    // Label badge
    const labelColor = e.label === 'CC' ? [70,150,120] : [120,100,180];
    doc.setFillColor(...labelColor);
    doc.roundedRect(mL + colNo + 2, rowY + 2, 14, 5, 1, 1, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    doc.text(e.label, mL + colNo + 9, rowY + 5.8, { align: 'center' });

    // Transcript text
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(220, 218, 235);
    const textLines = doc.splitTextToSize(e.text || '', colTranscript - 6);
    textLines.forEach((line, li) => {
      doc.text(line, mL + colNo + 2, rowY + 9 + li * 4.5);
    });

    // Notes
    doc.setTextColor(180, 175, 200);
    notesLines.forEach((line, li) => {
      doc.text(line, mL + colNo + colTranscript + 2, rowY + 4 + li * 4.5);
    });

    // Advice
    doc.setTextColor(232, 192, 125);
    adviceLines.forEach((line, li) => {
      doc.text(line, mL + colNo + colTranscript + colNotes + 2, rowY + 4 + li * 4.5);
    });

    y += rowH;
  });

  // Memo
  if (memo.trim()) {
    y += 6;
    checkPage(20);
    doc.setFillColor(25, 25, 38);
    doc.setDrawColor(80, 75, 110);
    doc.setLineWidth(0.3);
    const memoLines = doc.splitTextToSize(memo, contentW - 8);
    const memoH = memoLines.length * 5 + 12;
    doc.rect(mL, y, contentW, memoH, 'FD');
    doc.setTextColor(160, 155, 180);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('総合メモ・フィードバック', mL + 4, y + 6);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(210, 208, 225);
    memoLines.forEach((line, li) => {
      doc.text(line, mL + 4, y + 12 + li * 5);
    });
  }

  // Page numbers
  const pages = doc.internal.getNumberOfPages();
  for (let p = 1; p <= pages; p++) {
    doc.setPage(p);
    doc.setFontSize(8);
    doc.setTextColor(100, 95, 130);
    doc.text(`${p} / ${pages}`, pageW - mR, pageH - 4, { align: 'right' });
  }

  const dateStr = date.replace(/-/g,'');
  doc.save(`面談記録_${dateStr}.pdf`);
  showToast('PDFを出力しました ✦');
}

// ─── Text DL ───
function downloadTxt() {
  const date = document.getElementById('sessionDate').value;
  const ccName = document.getElementById('ccName').value || 'CC';
  const clName = document.getElementById('clName').value || 'CL';
  const memo = document.getElementById('memoText').value;

  let txt = `【面談記録】\n実施日：${date}\nCC：${ccName} ／ CL：${clName}\n${'─'.repeat(60)}\n\n`;
  txt += `番号\t逐語録\t気づき・改善案・新案\tアドバイス\n${'─'.repeat(60)}\n`;
  entries.forEach((e, i) => {
    const speaker = e.label === 'CC' ? `CC（${ccName}）` : `CL（${clName}）`;
    txt += `${String(i+1).padStart(2,'0')}\t[${speaker}] ${e.text}\t${e.notes}\t${e.advice}\n`;
  });
  if (memo.trim()) { txt += `\n${'─'.repeat(60)}\n【総合メモ】\n${memo}\n`; }

  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `面談記録_${date.replace(/-/g,'')}.txt`;
  a.click();
  showToast('テキストファイルをダウンロードしました');
}

// ─── Helpers ───
function setStatus(type, text) {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  document.getElementById('statusText').textContent = text;
}
function showLoading(v) { document.getElementById('loadingOverlay').classList.toggle('show', v); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
